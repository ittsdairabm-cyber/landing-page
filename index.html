<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Tipografía Alecrim -->
    <link href="https://fonts.googleapis.com/css2?family=Alecrim&display=swap" rel="stylesheet">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="estilos.css">
    <title>GEER</title>
</head>

<body>

    <header class="cabecera">
        <nav class="navbar navbar-expand-lg container">
            
            <!-- LOGO -->
            <a class="navbar-brand logo" href="#">
                <img src="logo.png" alt="Geer" class="logo-img">
            </a>

            <!-- BOTÓN HAMBURGUESA -->
            <button class="navbar-toggler text-white" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
                <span class="navbar-toggler-icon"></span>
            </button>

            <!-- MENÚ -->
            <div class="collapse navbar-collapse justify-content-end" id="menu">
                <ul class="navbar-nav align-items-lg-center gap-lg-3 text-center">
                    <li class="nav-item">
                        <a class="nav-link" href="#quieselgerr">Qui es el Geer?</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#Musica">Musica</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#Merchandising">Merchandising</a>
                    </li>
                    <li class="nav-item">
                        <button class="btn btn-outline-light btn-sm mt-2 mt-lg-0">Buscar</button>
                    </li>
                </ul>
            </div>

        </nav>
    </header>

    <!-- HERO -->
    <section class="hero d-flex align-items-center justify-content-center text-center">
        <div class="moon"></div>

        <div>
            <h1 class="display-2 fw-bold">GEER</h1>
            <p class="lead destacado">La nueva voz que está marcando tendencia</p>
            <button class="btn btn-lg btn-outline-light">Escuchar ahora</button>
        </div>
    </section>

    <!-- SECCIONES -->
    <section id="quieselgerr" class="seccion">
        <div class="container">
            <h2>¿Quién es el Geer?</h2>
            <p>Información sobre el artista.</p>
        </div>
    </section>

    <section id="Musica" class="seccion">
        <div class="container">
            <h2>Música</h2>
            <div class="row">
                <div class="col-md-4">Canción 1</div>
                <div class="col-md-4">Canción 2</div>
                <div class="col-md-4">Canción 3</div>
            </div>
        </div>
    </section>

    <section id="Merchandising" class="seccion">
        <div class="container">
            <h2>Merchandising</h2>
            <div class="row">
                <div class="col-md-4">Camiseta</div>
                <div class="col-md-4">Sudadera</div>
                <div class="col-md-4">Gorra</div>
            </div>
        </div>
    </section>

    <footer class="pie"></footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
