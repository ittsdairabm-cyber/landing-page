<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="estilos.css">
    <title>GEER</title>
</head>

<body>

    <header class="cabecera">
        <div class="container barra-navegacion">
            <a class="logo" href="#">Qui es <span>en Geer?</span></a>
            <nav class="enlaces-navegacion">
                <a href="#quieselgerr">Qui es el Geer?</a>
                <a href="#Musica">Musica</a>

                <button type="button" class="btn btn-outline-info btn-sm">Buscar</button>
            </nav>

    <section class="hero d-flex align-items-center justify-content-center text-center">

            <h1 class="display-2 fw-bold">GEER</h1>

            </div>
        </div>
    </section>

    <section id="Merchandising" class="seccion">
        <div class="container">
            <h2>Merchandising</h2>
            <div class="row">
                <div class="col-md-4">Camiseta</div>
                <div class="col-md-4">Sudadera</div>
                <div class="col-md-4">Gorra</div>
            </div>
        </div>

    <footer class="pie"></footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="landingpago.js"></script>
